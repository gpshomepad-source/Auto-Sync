name: Auto Sync and Decrypt TVBox

on:
  schedule:
    # 每日香港時間朝早 10:00 自動執行一次
    - cron: '0 2 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 檢出倉庫代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝需要用到的 Python 套件
      run: pip install requests pycryptodome

    - name: 執行解密與同步腳本
      run: python sync.py

    - name: 將最新解密的 JSON 儲存到倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tvbox.json
        # 如果檔案有變動就提交，無變動就跳過
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto sync: 更新並解密最新接口資料" && git push)
